description = """
Polecat work lifecycle — feature-branch variant.

Extends mol-polecat-base with feature-branch workspace setup and
reviewer-based submission. The polecat creates a feature branch,
implements the work, then pushes and reassigns to the Reviewer. The
Reviewer either passes the bead through to the Refinery for merge,
or rejects it back to the polecat pool with review findings.

## Polecat Contract (Self-Cleaning Model)

1. Receive work (molecule poured with this formula, assigned to you)
2. Follow steps in order (read descriptions, execute, move to next)
3. Submit: push branch, set metadata on work bead, assign to reviewer, exit
4. You are GONE — Reviewer judges, Refinery merges, the bead closes

**No MR beads.** Work beads flow directly:
pool → polecat → reviewer → refinery → closed.
The polecat sets `metadata.branch` and `metadata.target` on the work bead
and reassigns it to the Reviewer. The Reviewer reads the diff, writes
findings into the bead notes, and either reassigns to the Refinery
(clean) or returns the bead to the polecat pool (block findings) with
`rejection_reason` set.
`{{base_branch}}` may come from the work bead's own `metadata.target` or
be inherited from a parent convoy with `metadata.target` set.

**Rejection-aware.** If the work bead has `metadata.branch` and
`metadata.rejection_reason`, a previous attempt was rejected. Read
`metadata.review_status` to tell what happened: `findings` means the
Reviewer flagged issues (full report in bead notes), absent or
something else means the Refinery rejected on merge/test grounds.
Either way: resume the existing branch — don't redo all the work.

## Failure Modes

| Situation | Action |
|-----------|--------|
| Tests fail | Fix them. Do not proceed with failures. |
| Blocked on external | Mail Witness, mark yourself stuck |
| Context filling | `gc runtime request-restart` (blocks until controller kills you) |
| Unsure what to do | Mail Witness, don't guess |"""
formula = "mol-polecat-work"
extends = ["mol-polecat-base"]
version = 10

[[steps]]
id = "stamp-worker-pool"
title = "Record original pool target for variant-aware rejection routing"
needs = ["load-context"]
description = """
Capture which polecat pool routed this bead to us, so reviewer/refinery
can bounce the bead back to the SAME pool on rejection — preserving the
model-tier choice (opus/sonnet/haiku) that the slinger made.

Idempotent: only stamps if `worker_pool` is unset. Safe to re-run after
rejection-resume (the value persists across handoffs).

**Background.** `metadata.gc.routed_to` carries the current routing
target — when the Mayor slings to `automatonai/polecat-opus`, that's
what's stamped there. But once we hand off to the reviewer, we
overwrite `gc.routed_to` with the reviewer's qualified name, so the
original opus-pool identity is lost. We mirror it into `worker_pool`
now, before that overwrite, so it survives the round-trip.

**Stamp:**
```bash
EXISTING_POOL=$(bd show {{issue}} --json | jq -r '.[0].metadata.worker_pool // empty')
if [ -z "$EXISTING_POOL" ]; then
    ROUTED=$(bd show {{issue}} --json | jq -r '.[0].metadata["gc.routed_to"] // empty')
    if [ -n "$ROUTED" ]; then
        bd update {{issue}} --set-metadata worker_pool="$ROUTED"
    fi
fi
```

If `gc.routed_to` is missing too (assignment-only path, no pool route),
we skip — the rejection target then falls back to the formula default
`<rig>/<binding_prefix>polecat` in mol-reviewer-work and
mol-refinery-patrol, preserving legacy behavior.

**Exit criteria:** `metadata.worker_pool` reflects the original pool
route (or remains unset for legacy assignment-only beads)."""

[[steps]]
id = "workspace-setup"
title = "Set up worktree and feature branch"
needs = ["stamp-worker-pool"]
description = """
Ensure you have an isolated git worktree and a clean feature branch.
Every check is idempotent — safe to re-run after crash/restart.

**Config: base_branch = {{base_branch}}**
**Config: setup_command = {{setup_command}}**

`{{base_branch}}` is resolved by `gc sling` in this order:
1. `metadata.target` on the work bead
2. `metadata.target` on the parent convoy chain
3. the rig repo's default branch

**1. Fetch latest:**
```bash
git fetch --prune origin
```

**2. Ensure worktree exists.**

Check if `metadata.work_dir` already records your worktree path:
```bash
WORKTREE=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.work_dir // empty')
```

**If worktree path exists in metadata** — reuse it:
```bash
cd "$WORKTREE"              # Enter existing worktree
```
If the directory is missing (witness cleaned it, disk issue), fall through
to create a new one.

**If no worktree** — create one scoped to the bead, not the agent:
```bash
WORKTREE_PATH=$(pwd)/worktrees/{{issue}}
git worktree add "$WORKTREE_PATH" --detach origin/{{base_branch}}
cd "$WORKTREE_PATH"
```
Record immediately so restarts and witness recovery can find it:
```bash
gc bd update {{issue}} --set-metadata work_dir="$WORKTREE_PATH"
```

Worktrees are scoped to the work bead (not the agent name) so that:
- An agent can pick up new work even if an old worktree is being recovered
- Multiple orphaned worktrees can coexist without collision
- The witness cleans them independently per-bead

**3. Ensure branch exists.**

Check if `metadata.branch` already records a branch:
```bash
BRANCH=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.branch // empty')
```

**If branch exists in metadata** — treat it as authoritative. This
metadata may come from rejection recovery or from a caller that wants
work applied to an existing branch. Fetch the named remote branch first.
If `origin/$BRANCH` exists, make the local branch fast-forward to that
remote tip or stop on divergence:
```bash
git fetch origin "+refs/heads/$BRANCH:refs/remotes/origin/$BRANCH" || \
    echo "Could not fetch metadata.branch=$BRANCH from origin. Checking local refs before stopping."
if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
    if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
        git checkout "$BRANCH" || exit 1
        git merge --ff-only "origin/$BRANCH" || {
            echo "Local branch $BRANCH diverged from origin/$BRANCH."
            echo "STOP. Reconcile the branch before continuing."
            gc runtime drain-ack
            exit 1
        }
    else
        git checkout --track -b "$BRANCH" "origin/$BRANCH" || exit 1
    fi
elif git show-ref --verify --quiet "refs/heads/$BRANCH"; then
    git checkout "$BRANCH" || exit 1
else
    echo "metadata.branch=$BRANCH was set but no local or origin branch exists."
    echo "STOP. Do not create a different branch."
    gc runtime drain-ack
    exit 1
fi
```
If resuming a rejected branch, rebase onto latest base:
```bash
REJECTION=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.rejection_reason // empty')
if [ -n "$REJECTION" ]; then
    git rebase origin/{{base_branch}}
    # If conflicts: resolve them (this is likely the rejection reason)
    # After resolving: git rebase --continue
    gc bd update {{issue}} --unset-metadata rejection_reason
fi
```

**If no branch** — create one and record it:
```bash
BRANCH="polecat/{{issue}}"
git checkout -b "$BRANCH" origin/{{base_branch}}
gc bd update {{issue}} --set-metadata branch="$BRANCH"
```

Recording the branch early means:
- Witness can find and salvage your work if you crash
- Rejection-aware resume knows which branch to check out
- The submit step updates the metadata (branch may change after rebase)

**3a. Sync `metadata.branch` to the actual current branch.**

The "If branch exists in metadata" path above does NOT update
`metadata.branch` (it assumed authoritative). The "If no branch" path
above only sets the formula's default `polecat/{{issue}}`. In both cases,
the polecat may have ended up on a different branch — for example when a
later polecat picks up a bead whose `metadata.branch` was set by an
earlier polecat working in a different worktree, or when the agent uses
its own per-polecat branch convention rather than the formula's default.
Without this sync, Reviewer and Refinery fetch the stale branch from
metadata and either review nothing (already-merged ancestor) or review
the wrong commits.

Always overwrite `metadata.branch` with the polecat's actual current
branch. Idempotent — no-op when metadata is already correct.
```bash
CURRENT_BRANCH=$(git branch --show-current)
gc bd update {{issue}} --set-metadata branch="$CURRENT_BRANCH"
```

**4. Ensure clean working state:**
```bash
git status                  # Should be clean
```

**5. Run project setup (if configured):**
```bash
{{setup_command}}
```
Empty setup_command → skip.

**Exit criteria:** In your worktree, on a clean feature branch, rebased
on latest {{base_branch}}, deps installed, worktree and branch recorded
on the bead."""

[[steps]]
id = "submit-and-exit"
title = "Submit work to reviewer and exit"
needs = ["self-review"]
description = """
Hand off your work to the Reviewer and self-clean. You cease to exist
after this step.

**1. Final clean-state verification (safeguard):**
```bash
git status --porcelain
```
If ANY output (untracked files, uncommitted changes):
```bash
git add -A && git commit -m "chore: capture remaining work ({{issue}})"
```
This is a belt-and-suspenders check — self-review should have caught this,
but we never push with untracked work left behind.

**2. Push your branch:**
```bash
git push origin HEAD
```

**3. Clean up local branch (prevent stale branch accumulation):**
```bash
BRANCH=$(git branch --show-current)
git checkout --detach                 # Detach so we can delete the branch
git branch -D "$BRANCH"              # Branch is pushed; reviewer fetches by name
```

**4. Update metadata on the work bead:**
```bash
gc bd update {{issue}} \
  --set-metadata target={{base_branch}} \
  --notes "Implemented: <brief summary>"
```
Branch was recorded in workspace-setup and is already in metadata.
This adds the target for the reviewer/refinery chain. If an existing
pull request was provided by the caller, `metadata.existing_pr` is
preserved for refinery validation after the reviewer passes the bead
through. The refinery records canonical `pr_url` only after verifying
the PR is open and matches the branch, base, and origin repository.

**5. Reassign to reviewer:**
```bash
REVIEWER_TARGET="${GC_RIG:+$GC_RIG/}{{binding_prefix}}reviewer"
gc bd update {{issue}} --status=open --assignee="" --set-metadata gc.routed_to="$REVIEWER_TARGET"
```

`${GC_RIG:+$GC_RIG/}{{binding_prefix}}reviewer` resolves to
`$GC_RIG/{{binding_prefix}}reviewer` when running inside a rig session,
or `{{binding_prefix}}reviewer` when running in an HQ-only city where
the workspace is the rig. Writing a rendered empty rig prefix produces
`/{{binding_prefix}}reviewer` and strands beads outside the reviewer pool.

Clear `assignee` (`--assignee=""`) and set `gc.routed_to=<pool>`. The
reviewer hook's tier-3 query is `bd ready --metadata-field
gc.routed_to=<pool> --unassigned` — setting `assignee=<pool template>`
makes the bead invisible to that query (pool names aren't session
identifiers, and `--unassigned` requires a null assignee). The
reviewer atomically claims via `bd update --claim`, which then fills
in the session-identifier assignee and bumps status to in_progress.

The reviewer will fetch your branch, diff it against {{base_branch}},
review against the security/architecture/tests/dead-code/edge-case
focus areas, and either:

- **Pass** — reassign the bead to the Refinery, which merges and closes it.
- **Reject** — return the bead to the polecat pool with `metadata.review_status=findings`,
  `metadata.rejection_reason` set, and the full report in the bead notes.
  A new polecat picks it up, reads the report, and resumes on the
  existing branch.

**6. Signal reconciler and exit.**
```bash
gc runtime drain-ack
exit
```

`gc runtime drain-ack` tells the reconciler to kill this session. The
reconciler only restarts you if the pool check command finds more work.
You are GONE. Done means gone. There is no idle state.

**Exit criteria:** Branch pushed, metadata set, bead reassigned to reviewer, drain acknowledged, session exited."""
