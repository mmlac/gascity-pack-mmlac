# polecat-sonnet — Claude Sonnet 4.6 variant of the polecat pool.
#
# Same lifecycle as the bare `polecat` agent (mol-polecat-work), pinned to
# sonnet. Use for the typical feature-implementation workload — the default
# choice when complexity is moderate.
#
# Persona pool is philosopher names (sonnet-only) — disjoint from polecat-opus
# (Mad Max) and polecat-haiku (rock bands). In practice {{.Agent}} in the
# work_dir resolved to the persona-qualified name, NOT the tier, so two tiers
# picking the same persona collapsed to the same worktree path and caused
# sibling-branch contamination. Per-tier disjoint pools eliminate that
# class of bug deterministically — no two tiers can ever pick the same name.
#
# Routing in:  gc sling <rig>/polecat-sonnet <bead>
# Routing out (on review/refinery rejection): preserved via the `worker_pool`
# metadata stamp set by mol-polecat-work stamp-worker-pool.

scope = "rig"
provider = "claude"
wake_mode = "fresh"
work_dir = ".gc/worktrees/{{.Rig}}/polecats/{{.Agent}}/{{.AgentBase}}"
prompt_template = "/gc/packs/mmlac/shared/polecat/prompt.template.md"
namepool = "/gc/packs/mmlac/shared/polecat/namepool-sonnet.txt"
nudge = "Run gc hook; it checks assigned work first, then routed pool work."
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}} --sync"]
idle_timeout = "2h"
min_active_sessions = 0
max_active_sessions = 5
default_sling_formula = "mol-polecat-work"

[option_defaults]
model = "sonnet"
effort = "max"
