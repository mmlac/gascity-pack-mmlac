# polecat-opus — Claude Opus 4.7 variant of the polecat pool.
#
# Same lifecycle as the bare `polecat` agent (mol-polecat-work), but pinned
# to opus and capped low because opus is expensive. Use for high-complexity
# work: deep refactors, architecture-level changes, gnarly bugs.
#
# Worktree path includes {{.Agent}} so polecat-opus/furiosa, polecat-sonnet/furiosa,
# and polecat/furiosa coexist on disk without collision when the namepool repeats.
#
# Routing in:  gc sling <rig>/polecat-opus <bead>
# Routing out (on review/refinery rejection): preserved via the `worker_pool`
# metadata stamp set by mol-polecat-work stamp-worker-pool. Without that
# stamp (legacy beads), rejection falls back to bare `<rig>/polecat`.

scope = "rig"
provider = "claude"
wake_mode = "fresh"
work_dir = ".gc/worktrees/{{.Rig}}/polecats/{{.Agent}}/{{.AgentBase}}"
prompt_template = "/gc/packs/mmlac/shared/polecat/prompt.template.md"
namepool = "/gc/packs/mmlac/shared/polecat/namepool.txt"
nudge = "Run gc hook; it checks assigned work first, then routed pool work."
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} {{.AgentBase}} --sync"]
idle_timeout = "2h"
min_active_sessions = 0
max_active_sessions = 2
default_sling_formula = "mol-polecat-work"

[option_defaults]
model = "opus"
effort = "high"
